<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begnex Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Inter', sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        a{
            text-decoration: none;
        }

        /* LOGO */

        .logo-box{
            text-align: center;
            margin-bottom: 34px;
        }

        .logo-box h1{
            font-size: 36px;
            font-weight: 800;
            color: #111;
            margin-bottom: 8px;
        }

        .logo-box p{
            font-size: 11px;
            letter-spacing: 4px;
            color: #777;
        }

        /* LOGIN BOX */

        .login-box{
            width: 100%;
            max-width: 430px;
            background: white;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            padding: 38px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.04);
        }

        .login-box h2{
            font-size: 34px;
            font-weight: 700;
            color: #111;
            margin-bottom: 10px;
        }

        /* MESSAGES / ERRORS */

        .error-text{
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 8px;
            color: #DC2626;
            font-size: 13px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        /* FORM */

        .form-group{
            margin-bottom: 26px;
        }

        .form-group label{
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .input-top{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .input-top label{
            margin-bottom: 0;
        }

        .forgot-link{
            font-size: 11px;
            color: #777;
        }

        .forgot-link:hover{
            color: #111;
        }

        .form-group input{
            width: 100%;
            height: 54px;
            border: 1px solid #E5E7EB;
            background: #F9FAFB;
            padding: 0 14px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            border-radius: 4px;
            transition: border-color .2s;
        }

        .form-group input:focus{
            border-color: black;
            background: white;
        }

        .form-group input::placeholder{
            color: #B0B0B0;
        }

        /* BUTTON */

        .login-btn{
            width: 100%;
            height: 56px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: .3s;
        }

        .login-btn:hover{
            opacity: .88;
        }

        /* FOOTER */

        .footer-text{
            margin-top: 80px;
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
            text-align: center;
        }

        /* RESPONSIVE */

        @media(max-width: 500px){

            body{
                padding: 20px;
            }

            .login-box{
                padding: 28px;
            }

            .login-box h2{
                font-size: 28px;
            }

        }

    </style>

</head>

<body>

    <!-- LOGO -->

    <div class="logo-box">
        <h1>⌂ Begnex</h1>
        <p>ADMIN PORTAL</p>
    </div>

    <!-- LOGIN -->

    <div class="login-box">

        <h2>Log In</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="error-text">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" style="margin-top: 28px;">

            {% csrf_token %}

            <!-- EMAIL -->

            <div class="form-group">

                <label>EMAIL ADDRESS</label>

                <input
                    type="email"
                    name="email"
                    placeholder="admin@begnex.com"
                    value="{{ request.POST.email|default:'' }}"
                    required
                    autofocus>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <div class="input-top">
                    <label>PASSWORD</label>
                </div>

                <input
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    required>

            </div>

            <!-- BUTTON -->

            <button type="submit" class="login-btn">
                Sign In to Dashboard →
            </button>

        </form>

    </div>

    <!-- FOOTER -->

    <div class="footer-text">
        © 2026 BEGNEX. ALL RIGHTS RESERVED.
    </div>

</body>

</html>
