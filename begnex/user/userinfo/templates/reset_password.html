<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Set New Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Inter', sans-serif;
            background: #05070D;
            overflow: hidden;
        }

        a{
            text-decoration: none;
        }

        /* MAIN */

        .reset-wrapper{
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* LEFT */

        .reset-left{
            width: 50%;
            position: relative;
            overflow: hidden;
        }

        .reset-left img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay{
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.72),
                rgba(0,0,0,0.15)
            );
        }

        .left-content{
            position: absolute;
            left: 40px;
            bottom: 40px;
            z-index: 5;
            color: white;
            max-width: 500px;
        }

        .small-line{
            width: 36px;
            height: 4px;
            background: #B8C7FF;
            margin-bottom: 24px;
        }

        .left-content h1{
            font-size: 76px;
            line-height: 78px;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 28px;
        }

        .left-content p{
            color: #B6BDC9;
            font-size: 18px;
            line-height: 36px;
        }

        /* RIGHT */

        .reset-right{
            width: 50%;
            background: #05070D;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 70px;
            position: relative;
        }

        .reset-box{
            width: 100%;
            max-width: 420px;
        }

        .top-text{
            color: #B8C7FF;
            font-size: 10px;
            letter-spacing: 4px;
            margin-bottom: 18px;
        }

        .reset-box h2{
            color: white;
            font-size: 52px;
            font-weight: 900;
            line-height: 56px;
            letter-spacing: -2px;
            margin-bottom: 52px;
        }

        /* FORM */

        .form-group{
            margin-bottom: 34px;
        }

        .form-group label{
            display: block;
            color: #8B93A7;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 18px;
        }

        .input-box{
            position: relative;
        }

        .input-box input{
            width: 100%;
            height: 58px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.14);
            outline: none;
            color: white;
            font-size: 16px;
            padding-right: 40px;
        }

        .input-box input:focus{
            border-color: #B8C7FF;
        }

        .input-box span{
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #6B7280;
            font-size: 14px;
        }

        /* BUTTON */

        .update-btn{
            width: 100%;
            height: 64px;
            border: none;
            background: linear-gradient(
                to right,
                #C7D5FF,
                #5B86FF
            );
            color: #111827;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* BACK */

        .back-login{
            margin-top: 26px;
            text-align: center;
        }

        .back-login a{
            color: #8B93A7;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* FOOT */

        .footer-text{
            position: absolute;
            bottom: 40px;
            right: 70px;
            color: #4B5563;
            font-size: 10px;
            text-align: right;
            line-height: 18px;
        }

        /* RESPONSIVE */

        @media(max-width: 992px){

            .reset-left{
                display: none;
            }

            .reset-right{
                width: 100%;
                padding: 34px;
            }

            .reset-box h2{
                font-size: 40px;
                line-height: 46px;
            }

        }

    </style>

</head>

<body>

    <section class="reset-wrapper">

        <!-- LEFT -->

        <div class="reset-left">

            <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=1974&auto=format&fit=crop"
                alt="bag">

            <div class="overlay"></div>

            <div class="left-content">

                <div class="small-line"></div>

                <h1>

                    SECURE YOUR
                    <br>
                    ACCESS

                </h1>

                <p>

                    Reset your security credentials.
                    Your digital vault remains fortified
                    under the Begnex encryption protocol.

                </p>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="reset-right">

            <div class="reset-box">

                <div class="top-text">

                    SECURITY PROTOCOL V.2.4

                </div>

                <h2>

                    SET NEW PASSWORD

                </h2>

                {% if error %}
                <div id="django-messages-error" style="position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 100%; max-width: 400px;">
                    <div style="color: #EF4444; font-size: 14px; text-align: center; background: rgba(239, 68, 68, 0.15); padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(239, 68, 68, 0.3); backdrop-filter: blur(10px);">
                        {{ error }}
                    </div>
                </div>
                <script>
                    setTimeout(function() {
                        var msg = document.getElementById('django-messages-error');
                        if (msg) {
                            msg.style.transition = 'opacity 0.5s ease';
                            msg.style.opacity = '0';
                            setTimeout(function() { msg.style.display = 'none'; }, 500);
                        }
                    }, 3000);
                </script>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="form-group">

                        <label>NEW PASSWORD</label>

                        <div class="input-box">

                            <input type="password"
                                name="password">

                            <span>🔒</span>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>CONFIRM NEW PASSWORD</label>

                        <div class="input-box">

                            <input type="password"
                                name="confirm_password">

                            <span>◌</span>

                        </div>

                    </div>

                    <button type="submit"
                        class="update-btn">

                        UPDATE PASSWORD →

                    </button>

                </form>

                <div class="back-login">

                    <a href="{% url 'login' %}">

                        ← BACK TO LOGIN

                    </a>

                </div>

            </div>

            <div class="footer-text">

                AUTH_TOKEN : 77-BEGN-08
                <br>
                SERVER_STATUS : ENCRYPTED

            </div>

        </div>

    </section>

</body>

</html>
