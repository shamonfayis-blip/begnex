<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Inter', sans-serif;
            background: #05070D;
            overflow: hidden;
        }

        a{
            text-decoration: none;
        }

        /* MAIN */

        .password-wrapper{
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* LEFT */

        .password-left{
            width: 48%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .password-left img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay{
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.7),
                rgba(0,0,0,0.1)
            );
        }

        .left-content{
            position: absolute;
            left: 34px;
            bottom: 34px;
            z-index: 5;
            color: white;
        }

        .left-content h1{
            font-size: 82px;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 20px;
        }

        .left-content p{
            color: #C7D5FF;
            font-size: 12px;
            letter-spacing: 5px;
        }

        /* RIGHT */

        .password-right{
            width: 52%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .password-box{
            width: 100%;
            max-width: 430px;
        }

        .password-box h2{
            color: white;
            font-size: 42px;
            font-weight: 900;
            line-height: 48px;
        }

        .line{
            width: 38px;
            height: 4px;
            background: #C7D5FF;
            margin: 18px 0 42px;
        }

        /* INPUTS */

        .form-group{
            margin-bottom: 16px;
        }

        .form-group label{
            display: block;
            color: #6B7280;
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .form-group input{
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: #020B2D;
            padding: 0 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .form-group input::placeholder{
            color: #4B5563;
        }

        .form-group input:focus{
            outline: 1px solid #2563EB;
        }

        /* PASSWORD HEADER */

        .password-header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .password-header label{
            color: #6B7280;
            font-size: 10px;
            letter-spacing: 3px;
        }

        .password-header a{
            color: #9CA3AF;
            font-size: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s ease;
        }
        
        .password-header a:hover{
            color: white;
        }

        /* ERROR */

        .error-text{
            margin-top: -10px;
            margin-bottom: 24px;
        }

        /* BUTTONS */

        .save-btn{
            width: 100%;
            height: 48px;
            border-radius: 12px;
            background: #2563EB;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: 0.2s ease;
        }

        .save-btn:active{
            transform: scale(0.98);
        }

        .back-btn{
            width: 100%;
            height: 48px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A1A1AA;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            margin-top: 14px;
            transition: 0.2s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        /* RESPONSIVE */

        @media(max-width: 992px){

            .password-left{
                display: none;
            }

            .password-right{
                width: 100%;
            }

        }

    </style>

</head>

<body>

    <!-- MAIN -->

    <section class="password-wrapper">

        <!-- LEFT -->

        <div class="password-left">

            <img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa?q=80&w=1974&auto=format&fit=crop"
                alt="bag">

            <div class="overlay"></div>

            <div class="left-content">

                <h1>BEGNEX</h1>

                <p>
                    ARCHITECTURAL PRECISION
                </p>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="password-right">

            <div class="password-box">

                <h2>

                    CHANGE PASSWORD

                </h2>

                <div class="line"></div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="form-group">

                        <div class="password-header">
                            <label>CURRENT PASSWORD</label>
                            <a href="{% url 'forgot_password' %}">
                                FORGOT PASSWORD?
                            </a>
                        </div>

                        <input type="password"
                            name="current_password">

                    </div>

                    <div class="form-group">

                        <label>NEW PASSWORD</label>

                        <input type="password"
                            name="new_password">

                    </div>

                    <div class="form-group">

                        <label>CONFIRM NEW PASSWORD</label>

                        <input type="password"
                            name="confirm_password">

                    </div>

                    <div class="error-text">

                        {% if error %}
                        <div id="django-messages-error" style="position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 100%; max-width: 400px;">
                            <div style="color: #EF4444; font-size: 14px; text-align: center; background: rgba(239, 68, 68, 0.15); padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(239, 68, 68, 0.3); backdrop-filter: blur(10px);">
                                {{ error }}
                            </div>
                        </div>
                        <script>
                            setTimeout(function() {
                                var msg = document.getElementById('django-messages-error');
                                if (msg) {
                                    msg.style.transition = 'opacity 0.5s ease';
                                    msg.style.opacity = '0';
                                    setTimeout(function() { msg.style.display = 'none'; }, 500);
                                }
                            }, 3000);
                        </script>
                        {% endif %}

                    </div>

                    <button type="submit"
                        class="save-btn">

                        SAVE CHANGES

                    </button>

                    <a href="{% url 'profile' %}"
                        class="back-btn">

                        BACK TO PROFILE

                    </a>

                </form>

                <script>
                (function () {
                    var form   = document.querySelector('form');
                    var curIn  = form.querySelector('input[name="current_password"]');
                    var newIn  = form.querySelector('input[name="new_password"]');
                    var cfmIn  = form.querySelector('input[name="confirm_password"]');

                    /* ---- create inline error spans ---- */
                    function addErrSpan(input) {
                        var s = document.createElement('span');
                        s.style.cssText = 'display:none;font-size:11px;color:#EF4444;margin-top:5px;';
                        input.parentNode.appendChild(s);
                        return s;
                    }

                    var curErr = addErrSpan(curIn);
                    var newErr = addErrSpan(newIn);
                    var cfmErr = addErrSpan(cfmIn);

                    /* ---- strength rules ---- */
                    var rulesEl = document.createElement('div');
                    rulesEl.style.cssText = 'margin:8px 0 16px;display:flex;flex-direction:column;gap:7px;';
                    var RULES = [
                        { id:'cp-len',   test: function(v){ return v.length >= 8; },   label: 'At least 8 characters' },
                        { id:'cp-upper', test: function(v){ return /[A-Z]/.test(v); }, label: 'One uppercase letter' },
                        { id:'cp-lower', test: function(v){ return /[a-z]/.test(v); }, label: 'One lowercase letter' },
                        { id:'cp-digit', test: function(v){ return /\d/.test(v); },    label: 'One number' },
                    ];
                    RULES.forEach(function(r) {
                        var row = document.createElement('div');
                        row.style.cssText = 'display:flex;align-items:center;gap:9px;font-size:12px;color:#9CA3AF;';
                        var dot = document.createElement('span');
                        dot.id = r.id;
                        dot.style.cssText = 'width:10px;height:10px;border-radius:50%;border:1.5px solid #374151;flex-shrink:0;transition:.2s;';
                        row.appendChild(dot);
                        row.appendChild(document.createTextNode(r.label));
                        rulesEl.appendChild(row);
                    });
                    newIn.parentNode.appendChild(rulesEl);

                    /* ---- helpers ---- */
                    function setErr(el, errEl, msg) {
                        el.style.outline = msg ? '1px solid #EF4444' : '';
                        errEl.textContent = msg;
                        errEl.style.display = msg ? 'block' : 'none';
                    }

                    function updateRules(val) {
                        RULES.forEach(function(r) {
                            var dot = document.getElementById(r.id);
                            var ok = r.test(val);
                            dot.style.background  = ok ? '#22C55E' : 'transparent';
                            dot.style.borderColor = ok ? '#22C55E' : '#374151';
                        });
                    }

                    function allPass(val) {
                        return RULES.every(function(r){ return r.test(val); });
                    }

                    /* ---- live listeners ---- */
                    curIn.addEventListener('input', function () {
                        setErr(curIn, curErr, this.value ? '' : 'Current password is required');
                    });

                    newIn.addEventListener('input', function () {
                        updateRules(this.value);
                        setErr(newIn, newErr, '');
                        if (cfmIn.value) {
                            setErr(cfmIn, cfmErr, cfmIn.value !== this.value ? 'Passwords do not match' : '');
                        }
                    });

                    cfmIn.addEventListener('input', function () {
                        setErr(cfmIn, cfmErr, this.value !== newIn.value ? 'Passwords do not match' : '');
                    });

                    /* ---- submit guard ---- */
                    form.addEventListener('submit', function (e) {
                        var ok = true;
                        if (!curIn.value) { setErr(curIn, curErr, 'Current password is required'); ok = false; }
                        else setErr(curIn, curErr, '');

                        var nv = newIn.value;
                        if (!nv) { setErr(newIn, newErr, 'New password is required'); ok = false; }
                        else if (!allPass(nv)) { setErr(newIn, newErr, 'Password does not meet all requirements'); ok = false; }
                        else setErr(newIn, newErr, '');

                        var cv = cfmIn.value;
                        if (!cv) { setErr(cfmIn, cfmErr, 'Please confirm your new password'); ok = false; }
                        else if (cv !== nv) { setErr(cfmIn, cfmErr, 'Passwords do not match'); ok = false; }
                        else setErr(cfmIn, cfmErr, '');

                        if (!ok) e.preventDefault();
                    });
                })();
                </script>

            </div>

        </div>

    </section>

    {% include 'includes/footer.html' %}

</body>

</html>
