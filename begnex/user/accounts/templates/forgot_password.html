<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body{
    width: 100%;
    height: 100%;
}

body{
    font-family: 'Inter', sans-serif;
    background: #000;
    overflow: hidden;
}

/* MAIN */

.forgot-container{
    width: 100%;
    height: 100vh;
    display: flex;
}

/* LEFT */

.left-section{
    width: 48%;
    position: relative;
    height: 100vh;
}

.left-image{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

.overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

.logo{
    position: absolute;
    top: 34px;
    left: 34px;
    z-index: 10;
    color: white;
    font-size: 24px;
    font-weight: 700;
}

.left-content{
    position: absolute;
    bottom: 70px;
    left: 50px;
    z-index: 10;
    max-width: 460px;
}

.left-content h1{
    color: white;
    font-size: 60px;
    font-weight: 800;
    line-height: 64px;
    letter-spacing: -3px;
}

.left-content p{
    color: #E5E7EB;
    font-size: 18px;
    line-height: 34px;
    margin-top: 24px;
}

/* RIGHT */

.right-section{
    width: 52%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.form-box{
    width: 100%;
    max-width: 430px;
}

/* TOP */

.form-box h2{
    color: white;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1.5px;
}

.form-box p{
    color: #6B7280;
    margin-top: 8px;
    font-size: 14px;
    line-height: 28px;
    margin-bottom: 24px;
}

/* INPUT */

.input-group{
    margin-bottom: 16px;
}

.input-group label{
    display: block;
    color: #6B7280;
    font-size: 10px;
    letter-spacing: 3px;
    margin-bottom: 8px;
}

.input-group input{
    width: 100%;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: #020B2D;
    padding: 0 18px;
    color: white;
    font-size: 14px;
    outline: none;
}

.input-group input::placeholder{
    color: #4B5563;
}

/* BUTTON */

.reset-btn{
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 12px;
    background: #2563EB;
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
}

/* DIVIDER */

.divider{
    width: 100%;
    height: 1px;
    background: #1F2937;
    margin: 20px 0;
}

/* BACK */

.back-login{
    text-align: center;
}

.back-login a{
    color: #9CA3AF;
    text-decoration: none;
    font-size: 13px;
}

/* RESPONSIVE */

@media(max-width: 992px){

    .left-section{
        display: none;
    }

    .right-section{
        width: 100%;
        padding: 40px 24px;
    }

    .form-box{
        max-width: 100%;
    }

    .form-box h2{
        font-size: 42px;
    }

}

    </style>

</head>

<body>

    <main class="forgot-container">

        <!-- LEFT -->

        <section class="left-section">

            <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1200&auto=format&fit=crop"
                alt="premium-bag"
                class="left-image">
            <div class="overlay"></div>

            <div class="logo">

                Begnex

            </div>

            <div class="left-content">

                <h1>

                    Find your way back to premium carry.

                </h1>

                <p>

                    Re-access your curated collection of
                    essential gear and daily companions.

                </p>

            </div>

        </section>

        <!-- RIGHT -->

        <section class="right-section">

            <div class="form-box">

                <h2>

                    Forgot Password?

                </h2>

                <p>

                    Enter your email address and we'll send
                    you a link to reset your password.

                </p>

                <form method="POST">

                    {% csrf_token %}

                    <div class="input-group">

                        <label>

                            EMAIL ADDRESS

                        </label>

                        <input type="email"
                            name="email"
                            placeholder="name@premium.com"
                            required>

                    </div>

                    <button type="submit"
                        class="reset-btn">

                        Send Reset Link →

                    </button>

                </form>

                <script>
                (function () {
                    var form    = document.querySelector('form');
                    var emailIn = form.querySelector('input[name="email"]');

                    var errSpan = document.createElement('span');
                    errSpan.style.cssText = 'display:none;font-size:11px;color:#EF4444;margin-top:6px;';
                    emailIn.parentNode.appendChild(errSpan);

                    var EM_PAT = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                    function setErr(msg) {
                        emailIn.style.outline = msg ? '1px solid #EF4444' : '';
                        errSpan.textContent  = msg;
                        errSpan.style.display = msg ? 'block' : 'none';
                    }

                    emailIn.addEventListener('input', function () {
                        var v = this.value.trim();
                        if (!v) { setErr(''); return; }
                        setErr(EM_PAT.test(v) ? '' : 'Enter a valid email address');
                    });

                    emailIn.addEventListener('blur', function () {
                        var v = this.value.trim();
                        if (!v) setErr('Email is required');
                        else if (!EM_PAT.test(v)) setErr('Enter a valid email address');
                        else setErr('');
                    });

                    form.addEventListener('submit', function (e) {
                        var v = emailIn.value.trim();
                        if (!v) { setErr('Email is required'); e.preventDefault(); }
                        else if (!EM_PAT.test(v)) { setErr('Enter a valid email address'); e.preventDefault(); }
                        else setErr('');
                    });
                })();
                </script>

                <div class="divider"></div>

                <div class="back-login">

                    <a href="{% url 'login' %}">

                        ← Back to Login

                    </a>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
