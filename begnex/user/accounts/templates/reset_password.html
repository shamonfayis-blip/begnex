<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body{
            width: 100%;
            height: 100%;
        }

        body{
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
        }

        /* MAIN */

        .reset-container{
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* LEFT */

        .left-section{
            width: 48%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .left-image{
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .overlay{
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
        }

        .logo{
            position: absolute;
            top: 34px;
            left: 34px;
            z-index: 10;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .left-content{
            position: absolute;
            bottom: 70px;
            left: 50px;
            z-index: 10;
            max-width: 420px;
        }

        .left-content h1{
            color: white;
            font-size: 60px;
            font-weight: 800;
            line-height: 64px;
            letter-spacing: -3px;
        }

        .blue-line{
            width: 80px;
            height: 4px;
            background: #2563EB;
            margin-top: 18px;
        }

        /* RIGHT */

        .right-section{
            width: 52%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .form-box{
            width: 100%;
            max-width: 430px;
        }

        /* TOP */

        .form-box h2{
            color: white;
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .form-box p{
            color: #9CA3AF;
            margin-top: 14px;
            font-size: 16px;
            line-height: 32px;
            margin-bottom: 40px;
        }

        /* INPUT */

        .input-group{
            margin-bottom: 22px;
        }

        .input-group label{
            display: block;
            color: #9CA3AF;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .password-box{
            position: relative;
        }

        .password-box input{
            width: 100%;
            height: 58px;
            border-radius: 14px;
            border: none;
            background: #0B0B0D;
            padding: 0 20px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .password-box input::placeholder{
            color: #4B5563;
        }

        .eye{
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #6B7280;
            cursor: pointer;
            font-size: 18px;
        }

        /* RULES */

        .rules{
            margin-top: 10px;
            margin-bottom: 32px;
        }

        .rule{
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            color: #9CA3AF;
            font-size: 14px;
        }

        .circle{
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #111827;
            border: 1px solid #1F2937;
        }

        .circle.active{
            background: #1447E6;
            border-color: #1447E6;
        }

        /* BUTTON */

        .update-btn{
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 14px;
            background: #1447E6;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
        }

        .update-btn:hover{
            background: #1D4ED8;
        }

        /* BACK */

        .back-login{
            text-align: center;
            margin-top: 24px;
        }

        .back-login a{
            color: #6B7280;
            text-decoration: none;
            font-size: 13px;
        }

        /* FOOTER */

        .footer{
            margin-top: 110px;
            color: #4B5563;
            font-size: 10px;
            letter-spacing: 3px;
        }
        .password-note{
            color: #9CA3AF;
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 32px;
        }

        /* RESPONSIVE */

        @media(max-width: 992px){

            body{
                overflow-y: auto;
            }

            .left-section{
                display: none;
            }

            .right-section{
                width: 100%;
                min-height: 100vh;
                padding: 40px 24px;
            }

            .form-box{
                max-width: 100%;
            }

            .form-box h2{
                font-size: 42px;
            }

        }

    </style>

</head>

<body>

    <main class="reset-container">

        <!-- LEFT -->

        <section class="left-section">

            <img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa?q=80&w=1200&auto=format&fit=crop"
                alt="bag-image"
                class="left-image">

            <div class="overlay"></div>

            <div class="logo">

                BEGNEX

            </div>

            <div class="left-content">

                <h1>

                    Protecting your digital assets with precision.

                </h1>

                <div class="blue-line"></div>

            </div>

        </section>

        <!-- RIGHT -->

        <section class="right-section">

            <div class="form-box">

                <h2>

                    Reset Password

                </h2>

                <p>

                    Ensure your new password is secure and unique to
                    your Begnex account.

                </p>

                <form method="POST">

                    {% csrf_token %}

                    <div class="input-group">

                        <label>

                            NEW PASSWORD

                        </label>

                        <div class="password-box">

                            <input type="password"
                                name="password"
                                placeholder="••••••••••••"
                                required>

                            <span class="eye">◉</span>

                        </div>

                    </div>

                    <div class="input-group">

                        <label>

                            CONFIRM PASSWORD

                        </label>

                        <div class="password-box">

                            <input type="password"
                                name="confirm_password"
                                placeholder="••••••••••••"
                                required>

                            <span class="eye">◉</span>

                        </div>

                    </div>

                    <p class="password-note">

                        Enter a strong and secure password

                    </p>

                    <button type="submit"
                        class="update-btn">

                        Update Password

                    </button>

                </form>

                <div class="back-login">

                    <a href="{% url 'login' %}">

                        ← BACK TO LOGIN

                    </a>

                </div>

                <div class="footer">

                    © 2024 BEGNEX. THE DIGITAL CURATOR.

                </div>

            </div>

        </section>

    </main>

</body>

</html>
